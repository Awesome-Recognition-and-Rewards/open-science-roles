project:
  type: website

website:
  title: "Handbook of Recognition and Rewards"
  favicon: public/favicon.png
  # cover-image: cover.png
  navbar:
    logo: public/RR_handbook_OpenScience_logo.png
    background: "#0080c9"
    logo-alt: "UNL-RR-OpenScience"
    title: false
    collapse-below: lg
    left:
      - text: "Chapters"
        menu:
          - text: All
            file: chapters.qmd
      # - text: Guides
      #   file: guides.qmd
    tools:
      - icon: github
        href: https://github.com/Awesome-Recognition-and-Rewards/open_science_roles
        text: Handbook of Recognition and Rewards for Open Science Practices
      # - icon: rss
      #   href: https://quarto.org/docs/blog/index.xml
      #   text: Quarto Blog RSS
  site-url: https://Awesome-Recognition-and-Rewards.github.io/open_science_roles
  repo-url: https://github.com/Awesome-Recognition-and-Rewards/open_science_roles
  issue-url: https://github.com/Awesome-Recognition-and-Rewards/open_science_roles/issues/new/choose
  repo-actions: [edit, issue]
  page-navigation: true
  bread-crumbs: true
  page-footer:
    left:
      - text: "CC0 Public Domain Dedication"
        href: "https://creativecommons.org/publicdomain/zero/1.0/legalcode"
    right:
      - text: "The Netherlands Recognition and Rewards Programme"
bibliography: references.bib

format:
  html:
    toc: true
    theme:
      - cosmo # https://bootswatch.com/
      - custom.scss # https://quarto.org/docs/output-formats/html-themes.html#theme-options
    code-copy: true
    code-overflow: wrap
